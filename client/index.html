<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8">
  <title>Orbit Collector Demo</title>
  <style>
    html,
    body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: #2b241f;
      font-family: 'Segoe UI', Arial, sans-serif;
    }

    #hud {
      position: fixed;
      top: 12px;
      left: 12px;
      color: #fff;
      font-size: 16px;
      font-weight: bold;
      text-shadow: 0 2px 4px rgba(0, 0, 0, 0.6);
      z-index: 10;
      background: rgba(0, 0, 0, 0.4);
      padding: 8px 16px;
      border-radius: 20px;
      backdrop-filter: blur(4px);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    #hitMessage {
      position: fixed;
      top: 70px;
      left: 50%;
      transform: translateX(-50%);
      color: #ffb3b3;
      font-size: 18px;
      font-weight: bold;
      text-shadow: 0 2px 6px rgba(0, 0, 0, 0.6);
      z-index: 10;
      opacity: 0.9;
    }

    #leaderboard {
      position: fixed;
      top: 12px;
      right: 12px;
      min-width: 220px;
      background: rgba(0, 0, 0, 0.42);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 16px;
      padding: 10px 12px;
      color: #fff;
      font-size: 13px;
      z-index: 10;
      backdrop-filter: blur(6px);
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.25);
    }

    .leaderboard-title {
      font-size: 13px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #ffd166;
      margin-bottom: 8px;
    }

    .leaderboard-section {
      margin-top: 6px;
    }

    .leaderboard-section-title {
      font-size: 11px;
      color: #9ad7ff;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 4px;
    }

    .leaderboard-list {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .leaderboard-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      background: rgba(255, 255, 255, 0.06);
      border-radius: 8px;
      padding: 4px 7px;
    }

    /* ── Mobile Controls ── */
    #joystick {
      position: fixed;
      left: 24px;
      bottom: 30px;
      width: 130px;
      height: 130px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.07);
      border: 2px solid rgba(255, 255, 255, 0.18);
      box-shadow: 0 0 20px rgba(0,0,0,0.4), inset 0 0 16px rgba(255,255,255,0.04);
      display: none;
      touch-action: none;
      z-index: 20;
      backdrop-filter: blur(4px);
    }

    #stick {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: radial-gradient(circle at 38% 35%, rgba(255,255,255,0.95), rgba(180,210,255,0.7));
      box-shadow: 0 4px 16px rgba(0,0,0,0.35), 0 0 10px rgba(74,157,255,0.4);
      touch-action: none;
      transition: box-shadow 0.1s;
    }

    /* Boost button */
    #boostBtn {
      position: fixed;
      right: 28px;
      bottom: 38px;
      width: 90px;
      height: 90px;
      border-radius: 50%;
      border: 3px solid rgba(255, 150, 0, 0.7);
      background: radial-gradient(circle at 40% 38%, rgba(255,180,40,0.22), rgba(255,80,0,0.18));
      box-shadow: 0 0 20px rgba(255, 120, 0, 0.4), inset 0 0 12px rgba(255,160,0,0.1);
      color: #ffd700;
      font-size: 13px;
      font-weight: bold;
      letter-spacing: 1px;
      text-transform: uppercase;
      display: none;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 4px;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
      z-index: 20;
      cursor: pointer;
      backdrop-filter: blur(4px);
      transition: box-shadow 0.12s, transform 0.12s, background 0.12s;
    }

    #boostBtn.active {
      background: radial-gradient(circle at 40% 38%, rgba(255,220,60,0.55), rgba(255,100,0,0.45));
      box-shadow: 0 0 32px rgba(255, 180, 0, 0.8), inset 0 0 16px rgba(255,200,0,0.2);
      transform: scale(0.94);
    }

    #boostBtn .boost-icon {
      font-size: 28px;
      line-height: 1;
    }

    /* Stamina ring on boost button */
    #boostStaminaRing {
      position: absolute;
      inset: -5px;
      border-radius: 50%;
      border: 3px solid transparent;
      border-top-color: #ff9a00;
      border-right-color: #ff9a00;
      animation: none;
      pointer-events: none;
    }

    #hint {
      position: fixed;
      bottom: 14px;
      left: 50%;
      transform: translateX(-50%);
      color: #ddd;
      font-size: 13px;
      opacity: 0.7;
      background: rgba(0, 0, 0, 0.4);
      padding: 6px 12px;
      border-radius: 12px;
      z-index: 10;
    }

    #startOverlay {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(15, 10, 8, 0.7);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      z-index: 99;
      transition: all 0.3s ease;
    }

    .overlay-card {
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 20px;
      padding: 40px 60px;
      text-align: center;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
      max-width: 450px;
      width: 90%;
      display: flex;
      flex-direction: column;
      align-items: center;
      color: #fff;
      transform: translateY(0);
      animation: fadeIn 0.4s ease-out;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    #overlayTitle {
      font-size: 38px;
      margin: 0 0 20px 0;
      font-weight: 800;
      background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 99%, #fecfef 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: 2px;
      text-shadow: 0 4px 12px rgba(0, 0, 0, 0.1);
    }

    .stats-container {
      margin-bottom: 25px;
      width: 100%;
      animation: fadeIn 0.3s ease;
    }

    .death-message {
      font-size: 15px;
      color: #cca;
      margin: 0 0 20px 0;
    }

    .highlight-attacker {
      font-weight: bold;
      color: #ff5555;
      text-shadow: 0 0 8px rgba(255, 85, 85, 0.4);
    }

    .stats-grid {
      display: flex;
      gap: 15px;
      justify-content: center;
      width: 100%;
    }

    .stat-box {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      padding: 12px 20px;
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .stat-label {
      font-size: 11px;
      text-transform: uppercase;
      color: #aaa;
      letter-spacing: 1px;
      margin-bottom: 4px;
    }

    .stat-value {
      font-size: 24px;
      font-weight: bold;
      color: #ffd700;
    }

    .input-group {
      width: 100%;
      margin-bottom: 25px;
    }

    #playerNameInput {
      width: 100%;
      padding: 12px 20px;
      box-sizing: border-box;
      border-radius: 10px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      background: rgba(255, 255, 255, 0.05);
      color: #fff;
      font-size: 16px;
      text-align: center;
      outline: none;
      transition: all 0.3s ease;
    }

    #playerNameInput:focus {
      border-color: #4a9dff;
      background: rgba(255, 255, 255, 0.1);
      box-shadow: 0 0 10px rgba(74, 157, 255, 0.3);
    }

    #startButton {
      width: 100%;
      padding: 14px 28px;
      border: none;
      border-radius: 12px;
      background: linear-gradient(135deg, #4a9dff 0%, #0066cc 100%);
      color: white;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 8px 20px rgba(74, 157, 255, 0.3);
      transition: all 0.2s ease;
    }

    #startButton:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 24px rgba(74, 157, 255, 0.45);
    }

    #startButton:active {
      transform: translateY(1px);
    }

    #startButton:disabled {
      background: rgba(255, 255, 255, 0.15);
      color: #888;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    canvas {
      display: block;
      cursor: crosshair;
    }
  </style>
</head>

<body>
  <div id="hud">
    <div>Điểm: <span id="score">0</span> &nbsp;|&nbsp; Power: <span id="orbitCount">0</span> &nbsp;|&nbsp; Hạ
      gục: <span id="killsCount">0</span> &nbsp;|&nbsp; Tọa độ: <span id="coords">--</span> &nbsp;|&nbsp; Hướng: <span
        id="direction">--</span> &nbsp;|&nbsp; Trạng thái: <span id="status">Đang kết nối...</span></div>
    <div id="staminaContainer" style="height: 6px; background: rgba(255,255,255,0.15); border-radius: 3px; overflow: hidden; margin-top: 8px;">
      <div id="staminaBar" style="width: 100%; height: 100%; background: linear-gradient(90deg, #ff9a00, #ff3d00); box-shadow: 0 0 6px #ff3d00; transition: width 0.05s linear;"></div>
    </div>
  </div>
  <div id="leaderboard">
    <div class="leaderboard-title">Bảng xếp hạng</div>
    <div class="leaderboard-section">
      <div class="leaderboard-section-title">Top điểm</div>
      <div id="topScoreList" class="leaderboard-list"></div>
    </div>
    <div class="leaderboard-section">
      <div class="leaderboard-section-title">Top hạ gục</div>
      <div id="topKillList" class="leaderboard-list"></div>
    </div>
  </div>
  <div id="hitMessage"></div>
  <div id="startOverlay">
    <div class="overlay-card">
      <h1 id="overlayTitle">SPINNER.IO</h1>
      <div id="gameStats" class="stats-container" style="display: none;">
        <p class="death-message">Bạn đã bị hạ gục bởi <span id="killedBy" class="highlight-attacker">--</span></p>
        <div class="stats-grid">
          <div class="stat-box">
            <span class="stat-label">Tổng Điểm</span>
            <span id="finalScore" class="stat-value">0</span>
          </div>
          <div class="stat-box">
            <span class="stat-label">Hạ Gục</span>
            <span id="finalKills" class="stat-value">0</span>
          </div>
        </div>
      </div>
      <div class="input-group">
        <input type="text" id="playerNameInput" placeholder="Nhập tên của bạn..." maxlength="15" />
      </div>
      <button id="startButton">Bắt đầu chơi</button>
    </div>
  </div>
  <div id="joystick">
    <div id="stick"></div>
  </div>
  <div id="boostBtn" aria-label="Boost">
    <span class="boost-icon">⚡</span>
    <span>BOOST</span>
  </div>
  <div id="hint">Di chuột để điều khiển · nhặt vòng tròn xanh</div>
  <canvas id="game"></canvas>
  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  <script type="module" src="./src/main.js"></script>
</body>

</html>
