<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8">
  <title>Orbit Collector Demo</title>
  <style>
    html,
    body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: #2b241f;
      font-family: 'Segoe UI', Arial, sans-serif;
    }

    #hud {
      position: fixed;
      top: 12px;
      left: 12px;
      color: #fff;
      font-size: 16px;
      font-weight: bold;
      text-shadow: 0 2px 4px rgba(0, 0, 0, 0.6);
      z-index: 10;
      background: rgba(0, 0, 0, 0.4);
      padding: 8px 16px;
      border-radius: 20px;
      backdrop-filter: blur(4px);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    #hitMessage {
      position: fixed;
      top: 70px;
      left: 50%;
      transform: translateX(-50%);
      color: #ffb3b3;
      font-size: 18px;
      font-weight: bold;
      text-shadow: 0 2px 6px rgba(0, 0, 0, 0.6);
      z-index: 10;
      opacity: 0.9;
    }

    #joystick {
      position: fixed;
      left: 24px;
      bottom: 24px;
      width: 120px;
      height: 120px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.09);
      display: none;
      touch-action: none;
      z-index: 10;
    }

    #stick {
      position: absolute;
      left: 30px;
      top: 30px;
      width: 60px;
      height: 60px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.9);
      box-shadow: 0 6px 18px rgba(0, 0, 0, 0.25);
      touch-action: none;
    }

    #hint {
      position: fixed;
      bottom: 14px;
      left: 50%;
      transform: translateX(-50%);
      color: #ddd;
      font-size: 13px;
      opacity: 0.7;
      background: rgba(0, 0, 0, 0.4);
      padding: 6px 12px;
      border-radius: 12px;
    }

    #startOverlay {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(15, 10, 8, 0.7);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      z-index: 99;
      transition: all 0.3s ease;
    }

    .overlay-card {
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 20px;
      padding: 40px 60px;
      text-align: center;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
      max-width: 450px;
      width: 90%;
      display: flex;
      flex-direction: column;
      align-items: center;
      color: #fff;
      transform: translateY(0);
      animation: fadeIn 0.4s ease-out;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    #overlayTitle {
      font-size: 38px;
      margin: 0 0 20px 0;
      font-weight: 800;
      background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 99%, #fecfef 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: 2px;
      text-shadow: 0 4px 12px rgba(0, 0, 0, 0.1);
    }

    .stats-container {
      margin-bottom: 25px;
      width: 100%;
      animation: fadeIn 0.3s ease;
    }

    .death-message {
      font-size: 15px;
      color: #cca;
      margin: 0 0 20px 0;
    }

    .highlight-attacker {
      font-weight: bold;
      color: #ff5555;
      text-shadow: 0 0 8px rgba(255, 85, 85, 0.4);
    }

    .stats-grid {
      display: flex;
      gap: 15px;
      justify-content: center;
      width: 100%;
    }

    .stat-box {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      padding: 12px 20px;
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .stat-label {
      font-size: 11px;
      text-transform: uppercase;
      color: #aaa;
      letter-spacing: 1px;
      margin-bottom: 4px;
    }

    .stat-value {
      font-size: 24px;
      font-weight: bold;
      color: #ffd700;
    }

    .input-group {
      width: 100%;
      margin-bottom: 25px;
    }

    #playerNameInput {
      width: 100%;
      padding: 12px 20px;
      box-sizing: border-box;
      border-radius: 10px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      background: rgba(255, 255, 255, 0.05);
      color: #fff;
      font-size: 16px;
      text-align: center;
      outline: none;
      transition: all 0.3s ease;
    }

    #playerNameInput:focus {
      border-color: #4a9dff;
      background: rgba(255, 255, 255, 0.1);
      box-shadow: 0 0 10px rgba(74, 157, 255, 0.3);
    }

    #startButton {
      width: 100%;
      padding: 14px 28px;
      border: none;
      border-radius: 12px;
      background: linear-gradient(135deg, #4a9dff 0%, #0066cc 100%);
      color: white;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 8px 20px rgba(74, 157, 255, 0.3);
      transition: all 0.2s ease;
    }

    #startButton:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 24px rgba(74, 157, 255, 0.45);
    }

    #startButton:active {
      transform: translateY(1px);
    }

    #startButton:disabled {
      background: rgba(255, 255, 255, 0.15);
      color: #888;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    canvas {
      display: block;
      cursor: crosshair;
    }
  </style>
</head>

<body>
  <div id="hud">
    <div>Điểm: <span id="score">0</span> &nbsp;|&nbsp; Power: <span id="orbitCount">0</span> &nbsp;|&nbsp; Hạ
      gục: <span id="killsCount">0</span> &nbsp;|&nbsp; Tọa độ: <span id="coords">--</span> &nbsp;|&nbsp; Hướng: <span
        id="direction">--</span> &nbsp;|&nbsp; Trạng thái: <span id="status">Đang kết nối...</span></div>
    <div id="staminaContainer" style="height: 6px; background: rgba(255,255,255,0.15); border-radius: 3px; overflow: hidden; margin-top: 8px;">
      <div id="staminaBar" style="width: 100%; height: 100%; background: linear-gradient(90deg, #ff9a00, #ff3d00); box-shadow: 0 0 6px #ff3d00; transition: width 0.05s linear;"></div>
    </div>
  </div>
  <div id="hitMessage"></div>
  <div id="startOverlay">
    <div class="overlay-card">
      <h1 id="overlayTitle">SPINNER.IO</h1>
      <div id="gameStats" class="stats-container" style="display: none;">
        <p class="death-message">Bạn đã bị hạ gục bởi <span id="killedBy" class="highlight-attacker">--</span></p>
        <div class="stats-grid">
          <div class="stat-box">
            <span class="stat-label">Tổng Điểm</span>
            <span id="finalScore" class="stat-value">0</span>
          </div>
          <div class="stat-box">
            <span class="stat-label">Hạ Gục</span>
            <span id="finalKills" class="stat-value">0</span>
          </div>
        </div>
      </div>
      <div class="input-group">
        <input type="text" id="playerNameInput" placeholder="Nhập tên của bạn..." maxlength="15" />
      </div>
      <button id="startButton">Bắt đầu chơi</button>
    </div>
  </div>
  <div id="joystick">
    <div id="stick"></div>
  </div>
  <div id="hint">Di chuột để điều khiển nhân vật · nhặt vòng tròn xanh</div>
  <canvas id="game"></canvas>
  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  <script type="module" src="./src/main.js"></script>
</body>

</html>
